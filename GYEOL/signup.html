<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | GYEOL</title>
    <link rel="stylesheet" href="./signup.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">
          <a href="./Brand.html">
            <img src="./assets/로고.png" alt="GYEOL logo" />
          </a>
        </h1>

        <div class="header-actions">
          <nav class="nav">
            <ul class="nav-list">
              <li><a href="./Brand.html">Brand</a></li>
              <li><a href="./scent.html">Scent</a></li>
              <li><a href="./shop.html">Shop</a></li>
            </ul>
          </nav>

          <a href="./cart.html" class="header-cart-btn icon-btn">
            <img src="./assets/장바구니 아이콘.png" alt="Cart icon" />
          </a>
          <a href="./Login.html" class="login-btn icon-btn">
            <img src="./assets/사람 아이콘.png" alt="Login icon" />
          </a>
        </div>
      </div>
    </header>

    <section class="login-section">
      <div class="login-box">
        <h2>Sign Up</h2>

        <form id="signup-form" novalidate>
          <div
            id="signup-status"
            class="form-status"
            role="status"
            aria-live="polite"
          ></div>

          <div class="input-group">
            <label for="signup-name">Name</label>
            <input
              id="signup-name"
              name="name"
              type="text"
              placeholder="Enter your name"
            />
          </div>

          <div class="input-group">
            <label for="signup-email">Email</label>
            <input
              id="signup-email"
              name="email"
              type="email"
              placeholder="Enter your email"
            />
          </div>

          <div class="input-group">
            <label for="signup-password">Password</label>
            <input
              id="signup-password"
              name="password"
              type="password"
              placeholder="Create password"
            />
          </div>

          <div class="input-group">
            <label for="signup-confirm-password">Confirm Password</label>
            <input
              id="signup-confirm-password"
              name="confirmPassword"
              type="password"
              placeholder="Confirm password"
            />
          </div>

          <button type="submit" class="login-btn">Create Account</button>

          <p class="signup-text">
            Already have an account?
            <a href="./Login.html">Login</a>
          </p>
        </form>
      </div>
    </section>

    <script src="./signup.js"></script>
  </body>
</html>
