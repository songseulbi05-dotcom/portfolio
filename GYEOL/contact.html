<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./contact.css" />
  </head>
  <body>
    <!-- Header -->

    <header class="header">
      <div class="header-inner">
        <h1 class="logo">
          <a href="./Brand.html">
            <img src="./assets/로고.png" alt="GYEOL logo" />
          </a>
        </h1>

        <div class="header-actions">
          <nav class="nav">
            <ul class="nav-list">
              <li><a href="./Brand.html">Brand</a></li>
              <li><a href="./scent.html">Scent</a></li>
              <li><a href="./shop.html">Shop</a></li>
            </ul>
          </nav>

          <a href="./cart.html" class="header-cart-btn icon-btn">
            <img src="./assets/장바구니 아이콘.png" alt="Cart icon" />
          </a>
          <a href="./Login.html" class="login-btn icon-btn">
            <img src="./assets/사람 아이콘.png" alt="Login icon" />
          </a>
        </div>
      </div>
    </header>

    <!-- Contact Section -->

    <section class="contact-section">
      <div class="contact-container">
        <h2>Contact</h2>

        <p class="contact-subtitle">
          If you have any questions about GYEOL,<br />
          please feel free to contact us.
        </p>

        <!-- Contact Form -->

        <form class="contact-form">
          <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="Enter your name" />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" />
          </div>

          <div class="input-group">
            <label>Message</label>
            <textarea placeholder="Write your message"></textarea>
          </div>

          <a href="./contact-success.html" class="send-btn">Send Message</a>
        </form>

        <!-- Contact Info -->

        <div class="contact-info">
          <h3>Customer Service</h3>

          <p>Email : contact@gyeol-studio.kr</p>
          <p>Business Hours : Mon - Fri 09:00 - 18:00</p>
        </div>
      </div>
    </section>

    <!-- Footer -->

    <footer class="footer">
      <div class="footer-inner">
        <p>© 2026 GYEOL. All Rights Reserved.</p>
      </div>
    </footer>
  </body>
</html>
